# PRODUCTION UNIQUEMENT — ne pas fusionner avec docker-compose.yml
# Usage : docker compose -f docker-compose.prod.yml up -d --build
# Ou : ./scripts/docker-prod.sh
# Prérequis : .env (VITE_*, CADDY_*), backend/.env, réseau Docker externe caddy_net (Caddy global sur le serveur)

services:
  api:
    build:
      context: ./backend
      target: prod
    container_name: dog-api
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      UPLOADS_DIR: /app/uploads
      CORS_ORIGIN: ${VITE_SITE_URL:?définir VITE_SITE_URL dans .env}
    expose:
      - "8080"
    restart: always
    volumes:
      - dog-data:/app/data
      - dog-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - caddy_net

  web:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:?définir VITE_API_URL dans .env}
        VITE_SITE_URL: ${VITE_SITE_URL:?définir VITE_SITE_URL dans .env}
    container_name: dog-web
    expose:
      - "80"
    restart: always
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true

volumes:
  dog-data:
  dog-uploads:
